name: Build Lepmon SD Card Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/use (e.g. v1.2.3). If empty, an auto tag is generated."
        required: false
      prerelease:
        description: "Mark release as prerelease"
        required: false
        type: boolean
        default: false

jobs:
  build-sd-image:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME_BASE: lepmon-sdcard

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        df -h

    - name: Deps
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-user-static binfmt-support parted kpartx zip wget curl xz-utils

    - name: Download RPi OS Lite 64 (Bookworm)
      run: |
        wget -O rpi-os-lite.img.xz https://downloads.raspberrypi.org/raspios_lite_arm64/images/raspios_lite_arm64-2024-03-15/2024-03-15-raspios-bookworm-arm64-lite.img.xz
        xz -d rpi-os-lite.img.xz

    - name: Expand image
      run: |
        dd if=/dev/zero bs=1M count=5120 >> rpi-os-lite.img
        sudo losetup -P /dev/loop0 rpi-os-lite.img
        sudo parted /dev/loop0 resizepart 2 100%
        sudo e2fsck -f -y -v /dev/loop0p2 || echo "e2fsck warnings ignored"
        sudo resize2fs /dev/loop0p2

    - name: Mount / chroot
      run: |
        mkdir -p /tmp/rpi-root
        sudo mount /dev/loop0p2 /tmp/rpi-root
        sudo mkdir -p /tmp/rpi-root/boot/firmware
        sudo mount /dev/loop0p1 /tmp/rpi-root/boot/firmware
        sudo cp /usr/bin/qemu-aarch64-static /tmp/rpi-root/usr/bin/
        sudo mount -t proc proc /tmp/rpi-root/proc
        sudo mount -t sysfs sysfs /tmp/rpi-root/sys
        sudo mount --bind /dev /tmp/rpi-root/dev
        sudo mount --bind /dev/pts /tmp/rpi-root/dev/pts
        
        # Configure boot/config.txt for I2C, SPI, UART
        CONFIG_FILE=/tmp/rpi-root/boot/firmware/config.txt
        sudo bash -c "grep -q '^enable_uart=1' $CONFIG_FILE || echo 'enable_uart=1' >> $CONFIG_FILE"
        sudo bash -c "grep -q '^dtparam=i2c_arm=on' $CONFIG_FILE || echo 'dtparam=i2c_arm=on' >> $CONFIG_FILE"
        sudo bash -c "grep -q '^dtparam=spi=on' $CONFIG_FILE || echo 'dtparam=spi=on' >> $CONFIG_FILE"
        # DB switch GPIO pin 13 during boot up to disable spotlight already during boot process
        sudo bash -c "grep -q '^gpio=13=op' $CONFIG_FILE || echo 'gpio=13=op' >> $CONFIG_FILE"
        
        # Enable SSH by default
        sudo touch /tmp/rpi-root/boot/firmware/ssh
        
        # Copy LepmonOS files (exclude large directories to save space)
        sudo mkdir -p /tmp/rpi-root/home/Ento/LepmonOS
        # DB packages via requirements
        #sudo mkdir -p /tmp/rpi-root/home/Ento/LepmonOS/packages
        sudo mkdir -p /tmp/rpi-root/home/Ento/LepmonOS/geo_ref_shapes
        
        # Copy Python files, configs, requirements, docs
        # EXCLUDE development and service tools (LepmonOS_Dev_* and LepmonOS_Service_*)
        # DB uncomment 5 following lines for final build. during image test we include these files, delete sixth
        for f in *.py *.sh *.json *.xml *.md *.txt; do
          case "$f" in
            LepmonOS_Dev_*|LepmonOS_Service_*) echo "Skipping dev/service file: $f" ;;
            *) sudo cp -r "$f" /tmp/rpi-root/home/Ento/LepmonOS/ 2>/dev/null || true ;;
          esac
        done
        #sudo cp -r *.py *.sh *.json *.xml *.md *.txt *.ttf /tmp/rpi-root/home/Ento/LepmonOS/ 2>/dev/null || true
        
        # Also remove service.py_BAK.py (backup file)
        sudo rm -f /tmp/rpi-root/home/Ento/LepmonOS/service.py_BAK.py 2>/dev/null || true
        
        # Copy templates directory if it exists
        if [ -d templates ]; then sudo cp -r templates /tmp/rpi-root/home/Ento/LepmonOS/; fi
        
        if [ -d startsequenz ]; then sudo cp -r startsequenz /tmp/rpi-root/home/Ento/LepmonOS/; fi
        
        # Copy packages and geo_ref_shapes
        # DB packages via requirements
        #sudo cp -r packages/* /tmp/rpi-root/home/Ento/LepmonOS/packages/ 2>/dev/null || true
        sudo cp -r geo_ref_shapes/* /tmp/rpi-root/home/Ento/LepmonOS/geo_ref_shapes/ 2>/dev/null || true

    - name: Install in chroot
      run: |
        # Copy install script from repo instead of using heredoc
        sudo cp install_lepmon.sh /tmp/rpi-root/install_lepmon.sh
        sudo chmod +x /tmp/rpi-root/install_lepmon.sh
        sudo chroot /tmp/rpi-root /install_lepmon.sh

    - name: Unmount
      run: |
        sudo sync
        sudo umount /tmp/rpi-root/dev/pts || true
        sudo umount /tmp/rpi-root/dev || true
        sudo umount /tmp/rpi-root/sys || true
        sudo umount /tmp/rpi-root/proc || true
        sudo umount /tmp/rpi-root/boot/firmware || true
        sudo umount /tmp/rpi-root || true
        
        # Shrink the filesystem to minimize image size
        sudo e2fsck -f -y /dev/loop0p2 || true
        sudo resize2fs -M /dev/loop0p2
        
        # Get the exact size of the shrunken partition
        BLOCK_COUNT=$(sudo dumpe2fs -h /dev/loop0p2 2>/dev/null | grep 'Block count:' | awk '{print $3}')
        BLOCK_SIZE=$(sudo dumpe2fs -h /dev/loop0p2 2>/dev/null | grep 'Block size:' | awk '{print $3}')
        
        if [ -n "$BLOCK_COUNT" ] && [ -n "$BLOCK_SIZE" ]; then
          # Add 10MB margin
          PART_SIZE=$(( (BLOCK_COUNT * BLOCK_SIZE) + 10*1024*1024 ))
          sudo resize2fs /dev/loop0p2 $(( PART_SIZE / BLOCK_SIZE ))s || true
        fi
        
        sudo losetup -d /dev/loop0
        
        # Truncate the image file to remove trailing empty space
        # Find end of last partition and truncate
        END_SECTOR=$(sudo parted -s rpi-os-lite.img unit s print 2>/dev/null | grep '^ 2' | awk '{print $3}' | tr -d 's')
        if [ -n "$END_SECTOR" ]; then
          TRUNC_SIZE=$(( (END_SECTOR + 1) * 512 ))
          truncate --size=$TRUNC_SIZE rpi-os-lite.img || true
        fi
        
        echo "Image size after shrink:"
        ls -lh rpi-os-lite.img

    - name: Compress
      run: |
        DATE=$(date +%Y%m%d)
        # Use maximum compression to stay under 2GB GitHub release limit
        zip -9 lepmon-sdcard-${DATE}.img.zip rpi-os-lite.img
        
        SIZE=$(stat --format=%s lepmon-sdcard-${DATE}.img.zip)
        SIZE_MB=$((SIZE / 1024 / 1024))
        echo "Compressed image size: ${SIZE_MB} MB"
        
        if [ $SIZE_MB -gt 2000 ]; then
          echo "::warning::Image is ${SIZE_MB}MB which exceeds 2GB GitHub release limit!"
          echo "Consider further disk reduction measures."
        else
          echo "Image size OK: ${SIZE_MB}MB (under 2GB limit)"
        fi
        
        ls -lh lepmon-sdcard-${DATE}.img.zip

    - name: Release (tag push - backward compat)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: lepmon-sdcard-*.img.zip
        body: |
          ## Lepmon SD Card Image
          
          Insect Timelapse Monitoring System for Raspberry Pi.
          Flash this .img.zip to an SD card (8GB+ recommended).
          
          **Default Credentials:** User: `Ento` / Password: `lepmon`
          **SSH:** Enabled by default on WiFi AP and Ethernet
          **Desktop:** Run `lepmon-desktop on` to activate LXDE
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONALTOKEN }}

    - name: Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lepmon-sdcard-image
        path: lepmon-sdcard-*.img.zip
        retention-days: 30

    # Compute the release tag for both tag-push and workflow_dispatch
    - name: Compute tag
      id: tag
      shell: bash
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          TAG="${GITHUB_REF#refs/tags/}"
        elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
          TAG="${{ github.event.inputs.tag }}"
        else
          TAG="v$(date +%Y%m%d)-${GITHUB_RUN_NUMBER}"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "TAG=$TAG" >> "$GITHUB_ENV"

    # Create or update the GitHub Release and upload asset
    - name: Release (create/update and upload asset)
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.tag.outputs.tag }}
        name: Lepmon ${{ steps.tag.outputs.tag }}
        body: |
          ## Lepmon SD Card Image

          Insect Timelapse Monitoring System for Raspberry Pi.

          ### Quick Start
          1. Flash this `.img.zip` to an SD card (8GB+ recommended)
          2. Boot the Raspberry Pi
          3. Connect to WiFi AP (password: `lepmon12`)
          4. Access web UI at http://192.168.4.1:8080/
          5. SSH: `ssh Ento@192.168.4.1` (password: `lepmon`)

          ### Features
          - Allied Vision camera support with MJPEG streaming
          - WiFi Access Point for direct connection
          - Web UI with live preview, focus analysis, and captured image gallery
          - **SSH enabled by default** (WiFi + Ethernet)
          - **I2C, SPI, UART enabled by default**
          - **LXDE desktop** available: `lepmon-desktop on`
          - Automatic timelapse capture with exposure optimization
          - Dev/Service files excluded from image for smaller size

          ### Default Credentials
          - User: `Ento` / Password: `lepmon`
          - WiFi AP Password: `lepmon12`
        prerelease: ${{ github.event.inputs.prerelease || false }}
        allowUpdates: true
        replacesArtifacts: false
        artifacts: "lepmon-sdcard-*.img.zip"
        artifactContentType: application/zip
        token: ${{ secrets.PERSONALTOKEN }}
